<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="/style/style.css">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="Play the classic Snake game with modern visuals and compete for high scores!">
</head>
<body>
    <h1>Snake Game</h1>
    
    <div class="score-container">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="score-box">High Score: <span id="high-score">0</span></div>
    </div>
    
    <div class="game-container">
        <canvas id="game-canvas" width="400" height="400"></canvas>
    </div>
    
    <div class="controls">
        <button id="start-btn">Start Game</button>
        <button id="pause-btn">Pause</button>
    </div>
    
    <div id="high-scores">
        <h2>High Scores</h2>
        <ul id="scores-list"></ul>
    </div>
    
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Game Over!</h2>
            <p>Your score: <span id="final-score"></span></p>
            <p>Enter your name to save your score:</p>
            <input type="text" id="player-name" placeholder="Your name">
            <button id="save-score">Save Score</button>
        </div>
    </div>

    <!-- Load scripts in the correct order -->
    <script src="/js/food.js"></script>
    <script src="/js/snake.js"></script>
    <script src="/js/scoreManager.js"></script>
    <script src="/js/uiController.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
